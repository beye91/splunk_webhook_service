version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: splunk-webhook-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webhook_admin}
      POSTGRES_USER: ${POSTGRES_USER:-webhook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webhook} -d ${POSTGRES_DB:-webhook_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Config API (FastAPI)
  # ============================================
  config-api:
    build:
      context: ./config-api
      dockerfile: Dockerfile
    container_name: splunk-webhook-config-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webhook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-webhook_admin}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${CONFIG_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Webhook Service (Flask/Gunicorn)
  # ============================================
  webhook-service:
    build:
      context: ./webhook-service
      dockerfile: Dockerfile
    container_name: splunk-webhook-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webhook}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-webhook_admin}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CONFIG_API_URL: http://config-api:8000
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      config-api:
        condition: service_started
    networks:
      - webhook-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Admin UI (Next.js)
  # ============================================
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: splunk-webhook-admin-ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${ADMIN_UI_PORT:-3000}:3000"
    depends_on:
      - config-api
    networks:
      - webhook-network

networks:
  webhook-network:
    driver: bridge

volumes:
  postgres_data:
